<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;800&display=swap');
    :root { --bg: #070a13; --theme: #ffb400; --card: #1e293b; --text: #ffffff; --input: #000; --danger: #ff3131; --success: #00ff66; }
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mukta', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 5px; }
    .app { width: 100%; border: 3px solid var(--theme); border-radius: 15px; padding: 10px; background: #0f172a; min-height: 98vh; display: flex; flex-direction: column; gap: 5px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 5px; border-bottom: 2px solid var(--theme); }
    .logo-area { display: flex; align-items: center; gap: 8px; color: var(--theme); font-weight: 800; font-size: 22px; }
    .date-section { background: #000; border-radius: 10px; padding: 4px; text-align: center; border: 1px solid var(--theme); }
    .nep-date { font-size: 20px; font-weight: 800; color: #00fffc; } 
    .loan-dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; margin: 5px 0; }
    .dash-box { background: #1e293b; border: 1px solid #475569; border-radius: 8px; padding: 5px 2px; text-align: center; }
    .dash-box span { font-size: 12px; color: #94a3b8; font-weight: 700; display: block; }
    .dash-box b { font-size: 18px; color: #fff; font-weight: 800; }
    .status-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 2px 0; }
    .red-bar { background: var(--danger); color: #fff; text-align: center; padding: 8px 2px; border-radius: 8px; font-weight: 800; font-size: 18px; border: 1px solid #fff; }
    .blue-bar { background: #0056b3; color: #fff; text-align: center; padding: 8px 2px; border-radius: 8px; font-weight: 800; font-size: 18px; border: 1px solid #fff; }
    label { font-size: 16px; color: var(--theme); margin-left: 5px; font-weight: 800; display: block; margin-top: 3px; }
    input, select { width: 100%; background: var(--input); border: 2px solid #64748b; border-radius: 8px; padding: 0 10px; height: 45px; color: #00ff66; font-size: 20px; font-weight: 800; outline: none; }
    .btn-save { width: 70%; background: var(--success); color: #000; border: none; padding: 12px; border-radius: 12px; font-size: 22px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; margin: 15px auto; }
    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; padding:15px; overflow-y: auto; }
    .modal-content { background: var(--card); border-radius: 20px; border: 3px solid var(--theme); padding: 20px; position: relative; }
    .camera-btn { width: 50px; height: 50px; background: #000; border: 1px solid var(--theme); border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; margin-top: 25px; }
    #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--success); color: #000; padding: 20px 40px; border-radius: 15px; font-weight: 900; z-index: 9999; border: 3px solid #fff; }
  </style>
</head>
<body>

<div id="toast">सफलतापूर्वक सुरक्षित भयो!</div>

<div class="app">
  <div class="header">
    <div class="logo-area"><i class="fas fa-bus-alt"></i> <b>बस व्यवस्थापन</b></div>
    <i class="fas fa-cog" style="color:var(--theme); font-size: 30px; cursor:pointer;" onclick="openMenu()"></i>
  </div>

  <div class="date-section"><div id="dispNep" class="nep-date">लोड हुँदै...</div></div>

  <div id="lDash" style="display:none;">
    <div class="loan-dash">
      <div class="dash-box"><span>अन्तिम मिति</span><b id="oDate">-</b></div>
      <div class="dash-box"><span>कारोबार</span><b id="oCount">०</b></div>
      <div class="dash-box"><span>पुरानो सावाँ</span><b id="oSaw">०</b></div>
      <div class="dash-box"><span>अन्तिम किस्ता</span><b id="lastK" style="color:#00fffc;">०</b></div>
      <div class="dash-box"><span>बाँकी ब्याज</span><b id="tByaj" style="color:var(--success);">०</b></div>
      <div class="dash-box"><span>कुल बाँकी</span><b id="oTotal" style="color:var(--theme);">०</b></div>
    </div>
  </div>

  <div class="status-container">
    <div class="red-bar">बाँकी: रु. <span id="hBal">०</span></div>
    <div class="blue-bar">अन्तिम: रु. <span id="lastAmt">०</span></div>
  </div>

  <form id="f">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
      <div><label>प्रकार</label>
        <select id="cat" onchange="ui()">
          <option value="संस्था">🏢 संस्था</option>
          <option value="ऋण">💰 ऋण</option>
          <option value="मर्मत">🛠️ मर्मत</option>
          <option value="कर्मचारी">👨‍✈️ कर्मचारी</option>
          <option value="व्यक्तिगत">👤 व्यक्तिगत</option>
        </select>
      </div>
      <div><label>मिति (AD)</label><input type="date" id="eD" onchange="updateDate(); sum();"></div>
    </div>
    <label>नाम छान्नुहोस्</label>
    <select id="tN" onchange="sum()"></select>

    <div id="loanUI" style="display:none; margin-top:5px; border:1px solid var(--theme); padding:8px; border-radius:10px;">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
        <div><label>सावाँ फिर्ता (-)</label><input type="number" id="pS" oninput="manualCalc()" value="0"></div>
        <div><label>थप सावाँ (+)</label><input type="number" id="aS" oninput="manualCalc()" value="0"></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; margin-top:5px;">
        <div><label id="kistaLabel">किस्ता</label><input type="number" id="curKista" oninput="autoSplit()" value="0" style="color:#ffb400"></div>
        <div><label>ब्याज तिरेको</label><input type="number" id="pB" oninput="manualCalc()" value="0"></div>
        <div><label>दर %</label><input type="number" id="r" oninput="manualCalc()" value="0"></div>
      </div>
    </div>

    <div id="billUI" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;">
      <div><label>पाउनु पर्ने (+)</label><input type="number" id="bA" value="0" oninput="manualCalc()"></div>
      <div><label>पाएको (-)</label><input type="number" id="pA" value="0" oninput="manualCalc()"></div>
    </div>

    <div style="display:flex; gap:8px; align-items:center; margin-top:5px;">
      <div style="flex:1;"><label>कैफियत</label><input type="text" id="remk" placeholder="विवरण..."></div>
      <div class="camera-btn" onclick="document.getElementById('fileInp').click()">
        <i class="fas fa-camera" style="color:var(--theme); font-size: 24px;"></i>
        <img id="imgPrev" style="display:none; width:100%; height:100%; object-fit:cover; position:absolute; border-radius:8px;">
      </div>
      <input type="file" id="fileInp" accept="image/*" style="display:none;" onchange="previewFile()">
    </div>
    <button type="button" class="btn-save" id="saveBtn" onclick="save()"><i class="fas fa-save"></i> सुरक्षित गर्नुहोस्</button>
  </form>
</div>

<div id="mMenu" class="modal">
  <div class="modal-content">
    <h2 style="color:var(--theme); border-bottom:2px solid var(--theme); margin-bottom:10px;">सेटिङ मेनु</h2>
    <label>मिति सच्याउनुहोस् (+१/-१)</label>
    <input type="number" id="sDateOff" placeholder="0">
    
    <label>संस्थाका नामहरू (कमा राख्नुहोस्)</label>
    <input type="text" id="sInst" placeholder="Bus 1, Bus 2">
    
    <label>ऋणका नामहरू</label>
    <input type="text" id="sLoan" placeholder="Name 1, Name 2">
    
    <label>व्यक्तिगत नामहरू</label>
    <input type="text" id="sPers" placeholder="Pers 1, Pers 2">
    
    <label>मर्मत / कर्मचारी</label>
    <input type="text" id="sStaff" placeholder="Staff 1, Mech 1">

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
      <button onclick="saveSettings()" style="background:var(--success); color:#000; padding:10px; border-radius:8px; font-weight:800;">सेभ सेटिङ</button>
      <button onclick="closeModal('mMenu')" style="background:var(--danger); color:#fff; padding:10px; border-radius:8px; font-weight:800;">बन्द</button>
    </div>
  </div>
</div>

<script>
  let cfg = { dateOff: 0 }, oldSawa = 0, oldInterest = 0, serverTotal = 0, imgBase64 = "";
  const nD = ['०','१','२','३','४','५','६','७','८','९'];
  const nM = ["बैशाख", "जेठ", "असार", "साउन", "भदौ", "असोज", "कात्तिक", "मंसिर", "पुष", "माघ", "फागुन", "चैत"];
  const nB = ["आइतबार", "सोमबार", "मंगलबार", "बुधबार", "बिहीबार", "शुक्रबार", "शनिबार"];
  const bsData = { 2081:[31,32,31,32,31,30,30,30,29,30,29,31], 2082:[31,31,32,31,31,31,30,29,30,29,30,30], 2083:[31,31,32,31,31,31,30,29,30,29,30,30] };

  function toN(n) { return n.toString().split('').map(d => nD[d] || d).join(''); }
  function openMenu() { 
    document.getElementById('sDateOff').value = cfg.dateOff || 0;
    document.getElementById('sInst').value = cfg.inst || "";
    document.getElementById('sLoan').value = cfg.loan || "";
    document.getElementById('sPers').value = cfg.pers || "";
    document.getElementById('sStaff').value = cfg.staff || "";
    document.getElementById('mMenu').style.display='block'; 
  }
  function closeModal(id) { document.getElementById(id).style.display='none'; }

  function saveSettings() {
    const s = {
      dateOff: document.getElementById('sDateOff').value,
      inst: document.getElementById('sInst').value,
      loan: document.getElementById('sLoan').value,
      pers: document.getElementById('sPers').value,
      staff: document.getElementById('sStaff').value,
      repair: document.getElementById('sStaff').value // Both use same
    };
    Object.keys(s).forEach(k => google.script.run.updateSettings(k, s[k]));
    alert("सेटिङ सेभ भयो! पेज रिलोड हुँदैछ...");
    location.reload();
  }

  function updateDate() {
    let now = new Date();
    let d = document.getElementById('eD').value ? new Date(document.getElementById('eD').value) : now;
    let baseDate = new Date("2024-04-13");
    let diff = Math.floor((d - baseDate) / 86400000); 
    let todayGate = 1 + diff + (parseInt(cfg.dateOff) || 0);
    let currY = 2081, currM = 0;
    while(todayGate > bsData[currY][currM]) { todayGate -= bsData[currY][currM]; currM++; if(currM > 11){ currM=0; currY++; } }
    document.getElementById('dispNep').innerText = toN(currY) + " " + nM[currM] + " " + toN(todayGate) + " " + nB[d.getDay()];
  }

  function ui() {
    let cat = document.getElementById('cat').value;
    let isL = (cat === 'ऋण' || cat === 'व्यक्तिगत');
    document.getElementById('loanUI').style.display = isL ? 'block' : 'none';
    document.getElementById('lDash').style.display = isL ? 'block' : 'none';
    document.getElementById('billUI').style.display = isL ? 'none' : 'grid';
    document.getElementById('kistaLabel').innerText = (cat === 'ऋण') ? "बचत (+)" : "किस्ता";
    
    let key = { 'संस्था':'inst', 'ऋण':'loan', 'मर्मत':'repair', 'कर्मचारी':'staff', 'व्यक्तिगत':'pers' }[cat];
    let items = cfg[key] ? cfg[key].split(',').filter(x=>x.trim()) : [];
    document.getElementById('tN').innerHTML = items.map(x => `<option value="${x}">${x}</option>`).join('') || '<option value="">छान्नुहोस्</option>';
    sum();
  }

  function autoSplit() {
    let k = parseFloat(document.getElementById('curKista').value) || 0;
    let i = (k <= oldInterest) ? k : oldInterest;
    let s = (k > oldInterest) ? (k - oldInterest) : 0;
    document.getElementById('pB').value = Math.round(i);
    document.getElementById('pS').value = Math.round(s);
    manualCalc();
  }

  function manualCalc() {
    let cat = document.getElementById('cat').value, res = 0;
    let sF = parseFloat(document.getElementById('pS').value) || 0, tS = parseFloat(document.getElementById('aS').value) || 0, bT = parseFloat(document.getElementById('pB').value) || 0;
    if(cat === 'ऋण' || cat === 'व्यक्तिगत') { res = (oldSawa + tS - sF) + (oldInterest - bT); }
    else { res = serverTotal + (parseFloat(document.getElementById('bA').value)||0) - (parseFloat(document.getElementById('pA').value)||0); }
    document.getElementById('hBal').innerText = toN(Math.round(res));
    document.getElementById('lastAmt').innerText = toN(Math.round(res));
  }

  function sum() {
    let name = document.getElementById('tN').value, cat = document.getElementById('cat').value, ed = document.getElementById('eD').value;
    if(!name) return;
    google.script.run.withSuccessHandler(r => {
      document.getElementById('oDate').innerText = r.lastDate;
      document.getElementById('oSaw').innerText = toN(r.sawa);
      document.getElementById('tByaj').innerText = toN(r.accruedInterest);
      document.getElementById('oTotal').innerText = toN(r.total);
      document.getElementById('lastK').innerText = toN(r.lastK);
      document.getElementById('r').value = r.rate || 0;
      oldSawa = r.sawa; oldInterest = r.accruedInterest; serverTotal = r.total;
      manualCalc();
    }).getSummary(name, cat, ed);
  }

  function previewFile() {
    const file = document.getElementById('fileInp').files[0];
    const reader = new FileReader();
    reader.onloadend = () => { imgBase64 = reader.result; document.getElementById('imgPrev').src = reader.result; document.getElementById('imgPrev').style.display='block'; };
    if (file) reader.readAsDataURL(file);
  }

  function save() {
    let name = document.getElementById('tN').value, cat = document.getElementById('cat').value;
    if(!name) return alert("नाम छान्नुहोस्!");
    const btn = document.getElementById('saveBtn'); btn.disabled = true; btn.innerHTML = 'सुरक्षित हुँदैछ...';
    let engB = document.getElementById('hBal').innerText.replace(/[^०-९]/g, '').split('').map(c => nD.indexOf(c)).join('');
    let obj = { nepDate: document.getElementById('dispNep').innerText, engDate: document.getElementById('eD').value, cat: cat, name: name, rate: parseFloat(document.getElementById('r').value) || 0, addSawa_or_Bill: (cat.match(/ऋण|व्यक्तिगत/)) ? (parseFloat(document.getElementById('aS').value) || 0) : (parseFloat(document.getElementById('bA').value) || 0), paidKista_or_Pay: (cat.match(/ऋण|व्यक्तिगत/)) ? (parseFloat(document.getElementById('pS').value)||0 + parseFloat(document.getElementById('curKista').value)||0) : (parseFloat(document.getElementById('pA').value) || 0), paidByaj: parseFloat(document.getElementById('pB').value) || 0, totalAmt: parseFloat(engB) || 0, remarks: document.getElementById('remk').value, imageBlob: imgBase64 };
    google.script.run.withSuccessHandler(() => { document.getElementById('toast').style.display = 'block'; setTimeout(() => location.reload(), 1500); }).processEntry(obj);
  }

  window.onload = () => {
    document.getElementById('eD').value = new Date().toISOString().split('T')[0];
    google.script.run.withSuccessHandler(r => { cfg = r; updateDate(); ui(); }).getSettings();
  };
</script>
</body>
</html>
