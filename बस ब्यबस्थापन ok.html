<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;800&display=swap');
    :root { --bg: #070a13; --theme: #ffb400; --card: #1e293b; --text: #ffffff; --input: #000; --danger: #ff3131; --success: #00ff66; }
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mukta', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 5px; }

    .app { width: 100%; border: 4px solid var(--theme); border-radius: 15px; padding: 12px; background: #0f172a; min-height: 98vh; display: flex; flex-direction: column; gap: 8px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 8px; border-bottom: 3px solid var(--theme); }
    .logo-area { display: flex; align-items: center; gap: 10px; color: var(--theme); font-weight: 800; font-size: 24px; }
    
    .date-section { background: #000; border-radius: 10px; padding: 6px; text-align: center; border: 2px solid var(--theme); }
    .nep-date { font-size: 22px; font-weight: 800; color: #00fffc; } 
    .eng-small { font-size: 14px; color: #cbd5e1; }

    .loan-dash { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 5px 0; }
    .dash-box { background: #1e293b; border: 2px solid #475569; border-radius: 8px; padding: 8px 2px; text-align: center; }
    .dash-box span { font-size: 13px; color: #94a3b8; font-weight: 700; display: block; }
    .dash-box b { font-size: 19px; color: #fff; font-weight: 800; }

    .status-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 4px 0; }
    .red-bar { background: var(--danger); color: #fff; text-align: center; padding: 8px 2px; border-radius: 10px; font-weight: 800; font-size: 18px; border: 2px solid #fff; }
    .blue-bar { background: #0056b3; color: #fff; text-align: center; padding: 8px 2px; border-radius: 10px; font-weight: 800; font-size: 18px; border: 2px solid #fff; }

    label { font-size: 16px; color: var(--theme); margin-left: 5px; font-weight: 800; display: block; margin-top: 5px; }
    input, select { width: 100%; background: var(--input); border: 2px solid #64748b; border-radius: 10px; padding: 0 10px; height: 50px; color: #00ff66; font-size: 20px; font-weight: 800; outline: none; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    
    .btn-save { width: 75%; background: var(--success); color: #000; border: none; padding: 15px; border-radius: 15px; font-size: 24px; font-weight: 900; display: flex; align-items: center; justify-content: center; gap: 10px; cursor: pointer; box-shadow: 0 4px 0 #008f39; margin: 20px auto; }

    #toast { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--success); color: #000; padding: 25px 45px; border-radius: 20px; font-weight: 900; font-size: 26px; z-index: 9999; text-align: center; border: 4px solid #fff; }

    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; padding:15px; overflow-y: auto; }
    .modal-content { background: var(--card); border-radius: 20px; border: 3px solid var(--theme); padding: 20px; position: relative; top: 5%; }
    .menu-item { background: #0f172a; padding: 18px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; border: 2px solid #334155; border-left: 8px solid var(--theme); cursor: pointer; font-size: 20px; font-weight: 800; }
    
    .i-row { display: flex; justify-content: space-between; background: #000; padding: 14px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #444; font-size: 20px; font-weight: 800; color: #00ff66; }
    .camera-btn { width: 55px; height: 55px; background: #000; border: 2px solid var(--theme); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; margin-top: 25px; }
    .camera-btn img { width: 100%; height: 100%; object-fit: cover; position: absolute; }
  </style>
</head>
<body>

<div id="toast"><i class="fas fa-check-circle"></i> सुरक्षित भयो!</div>

<div class="app">
  <div class="header">
    <div class="logo-area"><i class="fas fa-bus-alt"></i> <b>बस व्यवस्थापन</b></div>
    <i class="fas fa-bars" style="color:var(--theme); font-size: 35px; cursor:pointer;" onclick="openMenu()"></i>
  </div>

  <div class="date-section">
    <div id="dispNep" class="nep-date">लोड हुँदै...</div>
    <div id="dispEng" class="eng-small">---</div>
  </div>

  <div id="lDash" style="display:none;">
    <div class="loan-dash">
      <div class="dash-box"><span>अन्तिम मिति</span><b id="oDate">-</b></div>
      <div class="dash-box"><span>कारोबार</span><b id="oCount">०</b></div>
      <div class="dash-box"><span>पुरानो सावाँ</span><b id="oSaw">०</b></div>
      <div class="dash-box"><span>अन्तिम किस्ता</span><b id="lastK" style="color:#00fffc;">०</b></div>
      <div class="dash-box"><span>बाँकी ब्याज</span><b id="tByaj" style="color:var(--success);">०</b></div>
      <div class="dash-box"><span>कुल बाँकी</span><b id="oTotal" style="color:var(--theme);">०</b></div>
    </div>
  </div>

  <div class="status-container">
    <div class="red-bar">बाँकी: रु. <span id="hBal">०</span></div>
    <div class="blue-bar">अन्तिम: रु. <span id="lastAmt">०</span></div>
  </div>

  <form id="f">
    <div class="grid-2">
      <div><label>प्रकार</label>
        <select id="cat" onchange="ui()">
          <option value="संस्था">🏢 संस्था</option>
          <option value="ऋण">💰 ऋण</option>
          <option value="मर्मत">🛠️ मर्मत</option>
          <option value="कर्मचारी">👨‍✈️ कर्मचारी</option>
          <option value="व्यक्तिगत">👤 व्यक्तिगत</option>
        </select>
      </div>
      <div><label>मिति (AD)</label><input type="date" id="eD" onchange="updateDate(); sum();"></div>
    </div>

    <label>नाम छान्नुहोस्</label>
    <select id="tN" onchange="sum()"></select>

    <div id="loanUI" style="display:none; margin-top:8px; border:2px solid var(--theme); padding:10px; border-radius:12px; background: rgba(0,0,0,0.2);">
      <div class="grid-2">
        <div><label>सावाँ फिर्ता (-)</label><input type="number" id="pS" oninput="calc()" value="0"></div>
        <div><label>थप सावाँ (+)</label><input type="number" id="aS" oninput="calc()" value="0"></div>
      </div>
      <div class="grid-3" style="margin-top:5px;">
        <div><label>किस्ता तिरेको</label><input type="number" id="curKista" oninput="calc()" value="0" style="color:#ffb400; border-color:var(--theme); font-size:18px;"></div>
        <div><label>ब्याज तिरेको</label><input type="number" id="pB" oninput="calc()" value="0" style="font-size:18px;"></div>
        <div><label>ब्याज दर %</label><input type="number" id="r" oninput="calc()" value="12" style="font-size:18px;"></div>
      </div>
    </div>

    <div id="billUI" class="grid-2">
      <div><label id="lblBill">पाउनु पर्ने (+)</label><input type="number" id="bA" value="0" oninput="calc()"></div>
      <div><label id="lblPaid">पाएको (-)</label><input type="number" id="pA" value="0" oninput="calc()"></div>
    </div>

    <div style="display:flex; gap:10px; align-items:center; margin-top:8px;">
      <div style="flex:1;"><label>कैफियत र फोटो</label><input type="text" id="remk" placeholder="विवरण..."></div>
      <div class="camera-btn" onclick="document.getElementById('fileInp').click()">
        <i class="fas fa-camera" style="color:var(--theme); font-size: 25px;"></i>
        <img id="imgPrev" style="display:none;">
      </div>
      <input type="file" id="fileInp" accept="image/*" style="display:none;" onchange="previewFile()">
    </div>

    <button type="button" class="btn-save" id="saveBtn" onclick="save()">
      <i class="fas fa-save"></i> सुरक्षित गर्नुहोस्
    </button>
  </form>
</div>

<div id="mMenu" class="modal">
  <div class="modal-content">
    <h2 style="text-align:center; color:var(--theme); margin-bottom:20px; font-weight:800; border-bottom: 2px solid #444; padding-bottom:10px;">सेटिङ मेनु</h2>
    <div class="menu-item" onclick="sub('inst')"><span>🏢 संस्था सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('loan')"><span>💰 ऋण सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('repair')"><span>🛠️ मर्मत सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('staff')"><span>👨‍✈️ कर्मचारी सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('pers')"><span>👤 व्यक्तिगत सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('date')"><span>📅 गते मिलाउनुहोस्</span> <i class="fas fa-chevron-right"></i></div>
    <button onclick="closeModal('mMenu')" style="width:100%; padding:18px; background:var(--danger); border:none; color:#fff; border-radius:10px; font-weight:800; font-size: 20px; margin-top:10px;">बन्द गर्नुहोस्</button>
  </div>
</div>

<div id="sSet" class="modal">
  <div class="modal-content">
    <h3 id="sT" style="text-align:center; color:var(--theme); margin-bottom:15px; font-weight:800; font-size: 22px;"></h3>
    <div id="dateTools" style="display:none;">
      <div style="display:flex; justify-content:center; gap:25px; margin: 20px 0;">
        <button onclick="adjDate(-1)" style="padding:15px 30px; background:var(--danger); color:white; border:none; border-radius:10px; font-weight:900; font-size: 22px;">- १ गते</button>
        <button onclick="adjDate(1)" style="padding:15px 30px; background:var(--success); color:black; border:none; border-radius:10px; font-weight:900; font-size: 22px;">+ १ गते</button>
      </div>
    </div>
    <div id="itemUI">
      <div style="display:flex; gap:10px; margin-bottom:15px;">
        <input type="text" id="nI" placeholder="नयाँ नाम...">
        <button onclick="addItem()" style="padding: 0 25px; background:var(--theme); border:none; border-radius:10px; font-weight:900; color:#000; font-size:18px;">थप्नु</button>
      </div>
      <div id="iL"></div>
    </div>
    <button onclick="closeModal('sSet'); openMenu();" style="width:100%; padding:18px; background:#475569; border:none; color:#fff; border-radius:12px; font-weight:800; font-size: 20px; margin-top:15px;">ब्याक जानुहोस्</button>
  </div>
</div>

<script>
  let cfg = { dateOff: 0 }, oldSawa = 0, oldInterest = 0, serverTotal = 0, curT = '', imgBase64 = "";
  const nD = ['०','१','२','३','४','५','६','७','८','९'];
  const nM = ["बैशाख", "जेठ", "असार", "साउन", "भदौ", "असोज", "कात्तिक", "मंसिर", "पुष", "माघ", "फागुन", "चैत"];
  const nB = ["आइतबार", "सोमबार", "मंगलबार", "बुधबार", "बिहीबार", "शुक्रबार", "शनिबार"];
  const bsData = { 2081:[31,32,31,32,31,30,30,30,29,30,29,31], 2082:[31,31,32,31,31,31,30,29,30,29,30,30], 2083:[31,31,32,31,31,31,30,29,30,29,30,30] };

  function toN(n) { return n.toString().split('').map(d => nD[d] || d).join(''); }
  function openMenu() { document.getElementById('mMenu').style.display='block'; }
  function closeModal(id) { document.getElementById(id).style.display='none'; }

  function sub(t) {
    curT = t; closeModal('mMenu');
    document.getElementById('sSet').style.display='block';
    let titles = {inst:'संस्था', loan:'ऋण', repair:'मर्मत', staff:'कर्मचारी', pers:'व्यक्तिगत', date:'गते'};
    document.getElementById('sT').innerText = titles[t] + " व्यवस्थापन";
    document.getElementById('dateTools').style.display = (t === 'date') ? 'block' : 'none';
    document.getElementById('itemUI').style.display = (t === 'date') ? 'none' : 'block';
    renderList();
  }

  function renderList() {
    if(curT === 'date') return;
    let items = cfg[curT] ? cfg[curT].split(',') : [];
    document.getElementById('iL').innerHTML = items.filter(x=>x.trim()).map((x,i) => `
      <div class="i-row"><span>${x}</span><i class="fas fa-trash" style="color:var(--danger); cursor:pointer;" onclick="removeItem(${i})"></i></div>`).join('');
  }

  function addItem() {
    let v = document.getElementById('nI').value.trim();
    if(!v) return;
    let items = cfg[curT] ? cfg[curT].split(',') : [];
    items.push(v);
    cfg[curT] = items.join(',');
    document.getElementById('nI').value = '';
    google.script.run.withSuccessHandler(() => { renderList(); ui(); }).updateSettings(curT, cfg[curT]);
  }

  function removeItem(i) {
    if(!confirm("के हटाउन चाहनुहुन्छ?")) return;
    let items = cfg[curT].split(',');
    items.splice(i,1);
    cfg[curT] = items.join(',');
    google.script.run.withSuccessHandler(() => { renderList(); ui(); }).updateSettings(curT, cfg[curT]);
  }

  function adjDate(val) {
    cfg.dateOff = (parseInt(cfg.dateOff) || 0) + val;
    google.script.run.updateSettings('dateOff', cfg.dateOff);
    updateDate();
  }

  function updateDate() {
    let now = new Date();
    let nepalTime = new Date(now.getTime() + (now.getTimezoneOffset() + 345) * 60000);
    let d = document.getElementById('eD').value ? new Date(document.getElementById('eD').value) : nepalTime;
    document.getElementById('dispEng').innerText = d.toDateString();
    let baseDate = new Date("2024-04-13");
    let diff = Math.floor((d - baseDate) / 86400000); 
    let todayGate = 1 + diff + (parseInt(cfg.dateOff) || 0);
    let currY = 2081, currM = 0;
    while(todayGate > bsData[currY][currM]) { todayGate -= bsData[currY][currM]; currM++; if(currM > 11){ currM=0; currY++; } }
    document.getElementById('dispNep').innerText = toN(currY) + " " + nM[currM] + " " + toN(todayGate) + " " + nB[d.getDay()];
  }

  function ui() {
    let cat = document.getElementById('cat').value;
    let isL = (cat === 'ऋण' || cat === 'व्यक्तिगत');
    document.getElementById('loanUI').style.display = isL ? 'block' : 'none';
    document.getElementById('lDash').style.display = isL ? 'block' : 'none';
    document.getElementById('billUI').style.display = isL ? 'none' : 'grid';

    if(cat === 'मर्मत' || cat === 'कर्मचारी') {
      document.getElementById('lblBill').innerText = "दिनु पर्ने (+)";
      document.getElementById('lblPaid').innerText = "दिएको रकम (-)";
    } else {
      document.getElementById('lblBill').innerText = "पाउनु पर्ने (+)";
      document.getElementById('lblPaid').innerText = "पाएको (-)";
    }

    let key = { 'संस्था':'inst', 'ऋण':'loan', 'मर्मत':'repair', 'कर्मचारी':'staff', 'व्यक्तिगत':'pers' }[cat];
    document.getElementById('tN').innerHTML = cfg[key] ? cfg[key].split(',').filter(x=>x.trim()).map(x => `<option value="${x.trim()}">${x.trim()}</option>`).join('') : '<option>थप्नुहोस्</option>';
    sum();
  }

  function sum() {
    let name = document.getElementById('tN').value, cat = document.getElementById('cat').value, ed = document.getElementById('eD').value;
    if(!name || name === 'थप्नुहोस्') return;
    google.script.run.withSuccessHandler(r => {
      document.getElementById('oDate').innerText = r.lastDate;
      document.getElementById('oCount').innerText = toN(r.count);
      document.getElementById('oSaw').innerText = toN(Math.round(r.sawa));
      document.getElementById('lastK').innerText = toN(Math.round(r.lastPaidKista));
      document.getElementById('tByaj').innerText = toN(r.accruedInterest);
      document.getElementById('oTotal').innerText = toN(r.total);
      document.getElementById('lastAmt').innerText = toN(Math.round(r.lastTransaction || 0));
      oldSawa = r.sawa; oldInterest = r.accruedInterest; serverTotal = r.total;
      calc();
    }).getSummary(name, cat, ed);
  }

  function calc() {
    let cat = document.getElementById('cat').value, res = 0;
    if(cat === 'ऋण' || cat === 'व्यक्तिगत') {
      let sF = parseFloat(document.getElementById('pS').value) || 0;
      let tS = parseFloat(document.getElementById('aS').value) || 0;
      let cK = parseFloat(document.getElementById('curKista').value) || 0;
      let bT = parseFloat(document.getElementById('pB').value) || 0;
      res = oldSawa + oldInterest + tS - (sF + cK + bT);
    } else {
      res = serverTotal + (parseFloat(document.getElementById('bA').value)||0) - (parseFloat(document.getElementById('pA').value)||0);
    }
    document.getElementById('hBal').innerText = toN(Math.round(res));
  }

  function save() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> सुरक्षित हुँदैछ...';
    let cat = document.getElementById('cat').value;
    let isL = (cat === 'ऋण' || cat === 'व्यक्तिगत');
    let engBal = document.getElementById('hBal').innerText.split('').map(c => nD.indexOf(c)!==-1?nD.indexOf(c):c).join('');
    
    let obj = {
      nepDate: document.getElementById('dispNep').innerText, engDate: document.getElementById('eD').value,
      cat: cat, name: document.getElementById('tN').value,
      rate: parseFloat(document.getElementById('r').value) || 0,
      addSawa_or_Bill: isL ? (parseFloat(document.getElementById('aS').value) || 0) : (parseFloat(document.getElementById('bA').value) || 0),
      paidKista_or_Pay: isL ? ((parseFloat(document.getElementById('pS').value) || 0) + (parseFloat(document.getElementById('curKista').value) || 0)) : (parseFloat(document.getElementById('pA').value) || 0),
      paidByaj: isL ? (parseFloat(document.getElementById('pB').value) || 0) : 0,
      totalAmt: parseFloat(engBal) || 0, remarks: document.getElementById('remk').value, imageBlob: imgBase64
    };
    google.script.run.withSuccessHandler(res => {
      if(res === "SUCCESS") {
        document.getElementById('toast').style.display = 'block';
        setTimeout(() => { document.getElementById('toast').style.display = 'none'; resetForm(); }, 3000);
      }
    }).processEntry(obj);
  }

  function resetForm() {
    const currentAD = document.getElementById('eD').value; 
    document.getElementById('f').reset(); 
    document.getElementById('eD').value = currentAD; 
    document.getElementById('imgPrev').style.display = 'none'; 
    imgBase64 = "";
    document.getElementById('saveBtn').disabled = false; 
    document.getElementById('saveBtn').innerHTML = '<i class="fas fa-save"></i> सुरक्षित गर्नुहोस्';
    sum();
  }

  function previewFile() {
    const file = document.getElementById('fileInp').files[0];
    const reader = new FileReader();
    reader.onloadend = () => { imgBase64 = reader.result; document.getElementById('imgPrev').src = reader.result; document.getElementById('imgPrev').style.display = 'block'; }
    if (file) reader.readAsDataURL(file);
  }

  window.onload = () => {
    let now = new Date();
    let nepalTime = new Date(now.getTime() + (now.getTimezoneOffset() + 345) * 60000);
    document.getElementById('eD').value = nepalTime.toISOString().split('T')[0];
    google.script.run.withSuccessHandler(r => { cfg = r; updateDate(); ui(); }).getSettings();
  };
</script>
</body>
</html>
