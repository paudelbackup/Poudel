<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;800&display=swap');
    :root { --bg: #0f172a; --theme: #ffb400; --card: #1e293b; --text: #f8fafc; --input: #0f172a; --danger: #ef4444; --success: #22c55e; }
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Mukta', sans-serif; }
    body { background: var(--bg); color: var(--text); padding: 5px; }

    .app { width: 100%; border: 2.5px solid var(--theme); border-radius: 15px; padding: 10px; background: rgba(30,41,59,0.98); min-height: 98vh; display: flex; flex-direction: column; gap: 6px; }
    .header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 5px; border-bottom: 1px solid #334155; }
    .logo-area { display: flex; align-items: center; gap: 8px; color: var(--theme); font-weight: 800; font-size: 18px; }
    
    /* नेपाली मिति - सानो बनाइएको */
    .date-box { background: rgba(0,0,0,0.4); border-radius: 8px; padding: 6px; text-align: center; border-bottom: 2.5px solid var(--theme); cursor: pointer; }
    .nep-date { font-size: 18px; font-weight: 800; color: var(--theme); }

    .loan-dash-container { display: flex; flex-direction: column; gap: 4px; margin-top: 5px; }
    .dash-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .dash-box { background: rgba(0,0,0,0.5); border: 1px solid #334155; border-radius: 6px; padding: 5px 2px; text-align: center; }
    .dash-box span { font-size: 9px; color: #94a3b8; display: block; }
    .dash-box b { font-size: 13px; color: #fff; font-weight: 800; }

    /* कुल बाँकी (Red Bar) - सानो बनाइएको */
    .red-bar { background: var(--danger); color: white; text-align: center; padding: 8px; border-radius: 8px; font-weight: 800; font-size: 18px; border: 1.5px solid #fff; margin: 4px 0; }

    label { font-size: 11px; color: #94a3b8; margin-left: 5px; }
    input, select { width: 100%; background: var(--input); border: 1.5px solid #334155; border-radius: 8px; padding: 0 10px; height: 42px; color: #fff; font-size: 16px; outline: none; font-weight: 600; }
    
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1.1fr; gap: 6px; }
    
    /* कैफियत र क्यामेरा - Equal Height Fix (42px) */
    .remarks-container { display: flex; gap: 8px; align-items: center; }
    .camera-btn { 
      width: 42px; height: 42px; background: var(--input); 
      border: 1.5px solid #334155; border-radius: 8px; 
      display: flex; align-items: center; justify-content: center; 
      cursor: pointer; overflow: hidden; color: var(--theme); font-size: 18px; flex-shrink: 0; 
    }
    .camera-btn img { width: 100%; height: 100%; object-fit: cover; }

    /* सुरक्षित गर्नुहोस् बटन - चिटिक्क पारिएको */
    .btn-save { width: 100%; background: var(--success); color: white; border: none; padding: 12px; border-radius: 10px; font-size: 18px; font-weight: 800; margin-top: auto; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; transition: 0.3s; }
    .btn-save:active { transform: scale(0.98); opacity: 0.9; }

    .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:2000; padding:15px; overflow-y: auto; }
    .modal-content { background: var(--card); border-radius: 15px; border: 2px solid var(--theme); padding: 15px; position: relative; top: 5%; }
    .menu-item { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--theme); cursor: pointer; }
    .i-list { max-height: 250px; overflow-y: auto; margin-top: 10px; }
    .i-row { display: flex; justify-content: space-between; background: #0f172a; padding: 10px; margin-bottom: 5px; border-radius: 5px; align-items: center; }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo-area"><i class="fas fa-bus"></i> <span>बस व्यवस्थापन</span></div>
    <i class="fas fa-bars" style="color:var(--theme); font-size: 24px; cursor: pointer;" onclick="openMenu()"></i>
  </div>

  <div class="date-box" onclick="sub('date')">
    <div id="dispNep" class="nep-date">लोड हुँदै...</div>
    <div id="dispEng" style="font-size: 10px; color: #94a3b8;">---</div>
  </div>

  <div id="lDash" style="display:none;" class="loan-dash-container">
    <div class="dash-row">
      <div class="dash-box"><span>अन्तिम मिति</span><b id="oDate">-</b></div>
      <div class="dash-box"><span>कारोबार</span><b id="oCount">०</b></div>
      <div class="dash-box"><span>पुरानो सावाँ</span><b id="oSaw">०</b></div>
    </div>
    <div class="dash-row">
      <div class="dash-box"><span>दर %</span><b id="oRate">०</b></div>
      <div class="dash-box"><span>बाँकी ब्याज</span><b id="tByaj" style="color:var(--success);">०</b></div>
      <div class="dash-box"><span>कुल बाँकी</span><b id="oTotal" style="color:var(--theme);">०</b></div>
    </div>
  </div>

  <div class="red-bar">कुल बाँकी: रु. <span id="hBal">०</span></div>

  <form id="f">
    <div class="grid-2">
      <div class="group"><label>प्रकार</label>
        <select id="cat" onchange="ui()">
          <option value="संस्था">🏢 संस्था</option>
          <option value="ऋण">💰 ऋण</option>
          <option value="मर्मत">🛠️ मर्मत</option>
          <option value="कर्मचारी">👨‍✈️ कर्मचारी</option>
          <option value="व्यक्तिगत">👤 व्यक्तिगत</option>
        </select>
      </div>
      <div class="group"><label>मिति (AD)</label><input type="date" id="eD" onchange="updateDate(); sum();"></div>
    </div>
    <div class="group" style="margin-top:2px;"><label>नाम छान्नुहोस्</label><select id="tN" onchange="sum()"></select></div>

    <div id="loanUI" style="display:none; border:1.5px solid #444; padding:8px; border-radius:10px; margin-top:5px;">
      <div class="grid-3">
        <div class="group"><label>सावाँ फिर्ता (-)</label><input type="number" id="pS" oninput="calc()" value="0"></div>
        <div class="group"><label>ब्याज तिरेको (-)</label><input type="number" id="pB" oninput="calc()" value="0"></div>
        <div class="group"><label>दर %</label><input type="number" id="r" oninput="calc()" value="12"></div>
      </div>
      <div class="grid-2" style="margin-top:5px;">
        <div class="group"><label>थप सावाँ (+)</label><input type="number" id="aS" oninput="calc()" value="0"></div>
        <div class="group"><label>अन्य किस्ता</label><input type="number" id="k" oninput="calc()" value="0"></div>
      </div>
    </div>

    <div id="billUI" class="grid-2" style="margin-top:2px;">
      <div><label id="lblPlus">पाउनु पर्ने (+)</label><input type="number" id="bA" value="0" oninput="calc()"></div>
      <div><label id="lblMinus">पाएको (-)</label><input type="number" id="pA" value="0" oninput="calc()"></div>
    </div>

    <div class="group" style="margin-top:2px;">
      <label>कैफियत र फोटो</label>
      <div class="remarks-container">
        <input type="text" id="remk" placeholder="विवरण...">
        <div class="camera-btn" onclick="document.getElementById('fileInp').click()">
          <i class="fas fa-camera" id="camIcon"></i>
          <img id="imgPrev" src="" style="display:none;">
        </div>
        <input type="file" id="fileInp" accept="image/*" capture="camera" style="display:none;" onchange="previewFile()">
      </div>
    </div>

    <button type="button" class="btn-save" id="saveBtn" onclick="save()">डाटा सुरक्षित गर्नुहोस्</button>
  </form>
</div>

<div id="mMenu" class="modal">
  <div class="modal-content">
    <h3 style="text-align:center; color:var(--theme); margin-bottom:15px;">सेटिङ मेनु</h3>
    <div class="menu-item" onclick="sub('inst')"><span>🏢 संस्था सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('loan')"><span>💰 ऋण सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('repair')"><span>🛠️ मर्मत सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('staff')"><span>👨‍✈️ कर्मचारी सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('pers')"><span>👤 व्यक्तिगत सेटिङ</span> <i class="fas fa-chevron-right"></i></div>
    <div class="menu-item" onclick="sub('date')"><span>📅 गते मिलाउनुहोस्</span> <i class="fas fa-chevron-right"></i></div>
    <button onclick="closeModal('mMenu')" style="width:100%; padding:15px; background:var(--danger); border:none; color:#fff; border-radius:10px; margin-top:10px;">बन्द गर्नुहोस्</button>
  </div>
</div>

<div id="sSet" class="modal">
  <div class="modal-content">
    <h3 id="sT" style="text-align:center; color:var(--theme); margin-bottom:15px;"></h3>
    <div id="itemUI">
      <div style="display:flex; gap:8px; margin-bottom:15px;">
        <input type="text" id="nI" placeholder="नयाँ नाम..." style="flex:1;">
        <button onclick="addItem()" style="width:70px; background:var(--theme); border:none; border-radius:8px; font-weight:800; height:42px;">थप्नुहोस्</button>
      </div>
      <div id="iL" class="i-list"></div>
    </div>
    <button onclick="closeModal('sSet')" style="width:100%; padding:15px; background:var(--danger); border:none; color:#fff; border-radius:12px; margin-top:15px;">बन्द गर्नुहोस्</button>
  </div>
</div>

<script>
  let cfg = { dateOff: 0 }, oldSawa = 0, oldInterest = 0, serverTotal = 0, curT = '', imgBase64 = "";
  const nD = ['०','१','२','३','४','५','६','७','८','९'];
  const nM = ["बैशाख", "जेठ", "असार", "साउन", "भदौ", "असोज", "कात्तिक", "मंसिर", "पुष", "माघ", "फागुन", "चैत"];
  const nB = ["आइतबार", "सोमबार", "मंगलबार", "बुधबार", "बिहीबार", "शुक्रबार", "शनिबार"];
  const bsData = { 2081:[31,32,31,32,31,30,30,30,29,30,29,31], 2082:[31,31,32,31,31,31,30,29,30,29,30,30], 2083:[31,31,32,31,31,31,30,29,30,29,30,30] };

  function toN(n) { return n.toString().split('').map(d => nD[d] || d).join(''); }
  function openMenu() { document.getElementById('mMenu').style.display='block'; }
  function closeModal(id) { document.getElementById(id).style.display='none'; }

  function previewFile() {
    const file = document.getElementById('fileInp').files[0];
    const reader = new FileReader();
    const preview = document.getElementById('imgPrev');
    const icon = document.getElementById('camIcon');
    reader.onloadend = function() {
      imgBase64 = reader.result;
      preview.src = reader.result;
      preview.style.display = 'block';
      icon.style.display = 'none';
    }
    if (file) reader.readAsDataURL(file);
  }

  function sub(t) { 
    curT = t; closeModal('mMenu'); 
    document.getElementById('sSet').style.display='block';
    let titles = {inst:'संस्था', loan:'ऋण', repair:'मर्मत', staff:'कर्मचारी', pers:'व्यक्तिगत', date:'गते'};
    document.getElementById('sT').innerText = (titles[t] || 'सेटिङ') + " व्यवस्थापन";
    renderList();
  }

  function renderList() {
    let items = cfg[curT] ? cfg[curT].split(',') : [];
    document.getElementById('iL').innerHTML = items.filter(x=>x).map((x,i) => `
      <div class="i-row">
        <span>${x}</span>
        <i class="fas fa-trash" style="color:var(--danger);" onclick="removeItem(${i})"></i>
      </div>`).join('');
  }

  function addItem() {
    let v = document.getElementById('nI').value.trim();
    if(!v) return;
    let items = cfg[curT] ? cfg[curT].split(',') : [];
    items.push(v);
    cfg[curT] = items.join(',');
    document.getElementById('nI').value = '';
    google.script.run.withSuccessHandler(() => { renderList(); ui(); }).updateSettings(curT, cfg[curT]);
  }

  function removeItem(i) {
    if(!confirm("हटाउन निश्चित हुनुहुन्छ?")) return;
    let items = cfg[curT].split(',');
    items.splice(i,1);
    cfg[curT] = items.join(',');
    google.script.run.withSuccessHandler(() => { renderList(); ui(); }).updateSettings(curT, cfg[curT]);
  }

  function updateDate() {
    let d = document.getElementById('eD').value ? new Date(document.getElementById('eD').value) : new Date();
    document.getElementById('dispEng').innerText = d.toDateString();
    let baseDate = new Date("2024-04-13");
    let diff = Math.floor((d - baseDate) / 86400000); 
    let todayGate = 1 + diff + (parseInt(cfg.dateOff) || 0);
    let currY = 2081, currM = 0;
    while(todayGate > bsData[currY][currM]) { todayGate -= bsData[currY][currM]; currM++; if(currM > 11){ currM=0; currY++; } }
    document.getElementById('dispNep').innerText = toN(currY) + " " + nM[currM] + " " + toN(todayGate) + " " + nB[d.getDay()];
  }

  function ui() {
    let cat = document.getElementById('cat').value;
    let isLoanType = (cat === 'ऋण' || cat === 'व्यक्तिगत');
    document.getElementById('loanUI').style.display = isLoanType ? 'block' : 'none';
    document.getElementById('lDash').style.display = isLoanType ? 'block' : 'none';
    document.getElementById('billUI').style.display = isLoanType ? 'none' : 'grid';
    let keyMap = { 'संस्था':'inst', 'ऋण':'loan', 'मर्मत':'repair', 'कर्मचारी':'staff', 'व्यक्तिगत':'pers' };
    let key = keyMap[cat];
    document.getElementById('tN').innerHTML = cfg[key] ? cfg[key].split(',').map(x => `<option value="${x.trim()}">${x.trim()}</option>`).join('') : '<option>नाम थप्नुहोस्</option>';
    sum();
  }

  function sum() {
    let name = document.getElementById('tN').value, cat = document.getElementById('cat').value, ed = document.getElementById('eD').value;
    if(!name || name.includes('नाम')) return;
    google.script.run.withSuccessHandler(r => {
      document.getElementById('oDate').innerText = r.lastDate;
      document.getElementById('oCount').innerText = toN(r.count);
      document.getElementById('oSaw').innerText = toN(Math.round(r.sawa));
      document.getElementById('oRate').innerText = toN(r.rate);
      document.getElementById('tByaj').innerText = toN(r.accruedInterest);
      document.getElementById('oTotal').innerText = toN(r.total);
      oldSawa = r.sawa; oldInterest = r.accruedInterest; serverTotal = r.total;
      calc();
    }).getSummary(name, cat, ed);
  }

  function calc() {
    let cat = document.getElementById('cat').value, finalTotal = 0;
    if(cat === 'ऋण' || cat === 'व्यक्तिगत') {
      let aS = parseFloat(document.getElementById('aS').value) || 0;
      let pS = parseFloat(document.getElementById('pS').value) || 0;
      let pB = parseFloat(document.getElementById('pB').value) || 0;
      finalTotal = oldSawa + oldInterest + aS - pS - pB;
    } else {
      let bA = parseFloat(document.getElementById('bA').value) || 0;
      let pA = parseFloat(document.getElementById('pA').value) || 0;
      finalTotal = serverTotal + bA - pA;
    }
    document.getElementById('hBal').innerText = toN(Math.round(finalTotal));
  }

  function save() {
    const btn = document.getElementById('saveBtn');
    if(!confirm("के तपाईं डाटा सुरक्षित गर्न चाहनुहुन्छ?")) return;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> सुरक्षित हुँदै...';

    let engTotal = document.getElementById('hBal').innerText.split('').map(c => nD.indexOf(c)!==-1?nD.indexOf(c):c).join('');
    
    let obj = {
      nepDate: document.getElementById('dispNep').innerText,
      engDate: document.getElementById('eD').value,
      cat: document.getElementById('cat').value, 
      name: document.getElementById('tN').value,
      rate: parseFloat(document.getElementById('r').value) || 0,
      addSawa: parseFloat(document.getElementById('aS').value) || 0,
      kista: parseFloat(document.getElementById('k').value) || 0,
      paidByaj: parseFloat(document.getElementById('pB').value) || 0,
      paidKista: parseFloat(document.getElementById('pS').value) || 0,
      billAmt: parseFloat(document.getElementById('bA').value) || 0,
      payAmt: parseFloat(document.getElementById('pA').value) || 0,
      totalAmt: parseFloat(engTotal) || 0,
      remarks: document.getElementById('remk').value,
      imageBlob: imgBase64
    };
    
    google.script.run.withSuccessHandler(() => {
      alert("डाटा सफलतापूर्वक सुरक्षित भयो!");
      location.reload();
    }).processEntry(obj);
  }

  window.onload = () => {
    document.getElementById('eD').value = new Date().toISOString().split('T')[0];
    google.script.run.withSuccessHandler(r => { cfg = r; updateDate(); ui(); }).getSettings();
  };
</script>
</body>
</html>
